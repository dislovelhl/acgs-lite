name: Deploy ClinicalGuard

on:
  push:
    branches: [main]
    paths:
      - "packages/clinicalguard/**"
      - "packages/acgs-lite/**"
      - "deploy/fly.toml"
      - ".github/workflows/deploy-clinicalguard.yml"
  workflow_dispatch:

concurrency:
  group: deploy-clinicalguard
  cancel-in-progress: false

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          pip install -e packages/acgs-lite
          pip install starlette uvicorn httpx pyyaml pydantic pytest pytest-asyncio pytest-timeout
          pip install "anthropic>=0.30" "openai>=1.0"
      - name: Run ClinicalGuard tests
        env:
          PYTHONPATH: packages
          OPENAI_API_KEY: test-key-for-unit-tests
          ANTHROPIC_API_KEY: test-key-for-unit-tests
        run: |
          python -m pytest packages/clinicalguard/tests/ \
            --import-mode=importlib -v --timeout=60

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy to Fly.io production
        run: |
          flyctl deploy \
            --config deploy/fly.toml \
            --dockerfile packages/clinicalguard/Dockerfile \
            --remote-only
      - name: Health check
        run: |
          sleep 10
          STATUS=$(curl -sf https://clinicalguard.fly.dev/health | python -c "import sys,json; print(json.load(sys.stdin)['status'])")
          if [ "$STATUS" != "ok" ]; then
            echo "Health check failed: status=$STATUS"
            exit 1
          fi
          echo "Health check passed: status=$STATUS"
