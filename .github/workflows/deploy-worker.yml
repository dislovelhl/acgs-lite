name: Deploy Governance Worker

# Deploys the Cloudflare Worker on every push to main that touches worker
# source files. Also runnable manually via workflow_dispatch.
#
# Required GitHub Actions secrets:
#   CF_API_TOKEN      — Cloudflare API token with Workers:Edit + KV:Edit + D1:Edit
#   CF_ACCOUNT_ID     — Cloudflare account ID
#   CF_KV_NAMESPACE_ID  — (optional) overrides wrangler.toml KV namespace id for forks
#   CF_D1_DATABASE_ID   — (optional) overrides wrangler.toml D1 database id for forks
#
# Secrets wrangler.put is called on:
#   CF_ADMIN_SECRET   — value for the ADMIN_SECRET wrangler secret on the worker
#
# Set secrets via GitHub UI: Settings → Secrets and variables → Actions

on:
  push:
    branches: [main]
    paths:
      - "workers/governance-proxy/**"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: false
        default: "production"

concurrency:
  group: deploy-worker-${{ github.ref }}
  cancel-in-progress: false  # never cancel an in-flight deploy

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    environment:
      name: cloudflare-workers
      url: https://api.acgs.ai/health

    defaults:
      run:
        working-directory: workers/governance-proxy

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: workers/governance-proxy/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run worker tests
        run: npm test

      - name: Patch wrangler.toml with fork-supplied resource IDs
        # Only substitutes if the secret is set — skips silently for the
        # canonical repo where IDs are already committed.
        env:
          KV_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          D1_ID: ${{ secrets.CF_D1_DATABASE_ID }}
        run: |
          if [ -n "$KV_ID" ]; then
            sed -i "s/fa596ca7a81a4ea28e24e690642c8d74/$KV_ID/g" wrangler.toml
            echo "Patched KV namespace ID from secret."
          fi
          if [ -n "$D1_ID" ]; then
            sed -i "s/815d7f79-790c-46e0-ae44-666b2ec0e53e/$D1_ID/g" wrangler.toml
            echo "Patched D1 database ID from secret."
          fi

      - name: Deploy worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npx wrangler deploy --minify

      - name: Push ADMIN_SECRET to worker
        # Idempotent — wrangler secret put is safe to re-run
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_ADMIN_SECRET: ${{ secrets.CF_ADMIN_SECRET }}
        run: |
          if [ -z "$CF_ADMIN_SECRET" ]; then
            echo "::warning::CF_ADMIN_SECRET secret not set — ADMIN_SECRET not pushed to worker."
          else
            echo "$CF_ADMIN_SECRET" | npx wrangler secret put ADMIN_SECRET
          fi

      - name: Smoke-test deployment
        # Non-blocking: logs result but does not fail the workflow
        continue-on-error: true
        run: |
          echo "Waiting 10s for deployment to propagate..."
          sleep 10
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://api.acgs.ai/health || echo "000")
          echo "Health check HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Health check returned $STATUS — verify deployment manually."
          fi
