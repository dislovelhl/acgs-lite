name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -e ".[dev,autonoma,anthropic,mcp,otel]" httpx
      - name: Lint
        run: ruff check src/acgs_lite/
      - name: Validate capability manifest
        if: matrix.python-version == '3.11'
        run: python -m acgs_lite.cli capabilities validate --max-age-days 45
      - name: Type check
        if: matrix.python-version == '3.11'
        continue-on-error: true
        run: mypy --config-file pyproject.toml
      - name: Test
        env:
          OPENAI_API_KEY: test-key-for-unit-tests
          ANTHROPIC_API_KEY: test-key-for-unit-tests
        run: |
          python -m pytest tests/ \
            --import-mode=importlib \
            -m "not slow and not benchmark and not e2e" \
            --ignore=tests/test_expanded_integrations.py \
            --ignore=tests/test_governed_constrained_output.py \
            -v --tb=short

  coverage:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev,autonoma,anthropic,mcp,otel]" httpx
      - name: Validate capability manifest
        run: python -m acgs_lite.cli capabilities validate --max-age-days 45
      - name: Test with coverage
        env:
          OPENAI_API_KEY: test-key-for-unit-tests
          ANTHROPIC_API_KEY: test-key-for-unit-tests
        run: |
          python -m pytest tests/ \
            --import-mode=importlib \
            --cov=src/acgs_lite \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            --ignore=tests/test_expanded_integrations.py \
            --ignore=tests/test_governed_constrained_output.py \
            -m "not slow and not benchmark and not e2e"

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tools
        run: pip install build twine
      - name: Build wheel and sdist
        run: python -m build --wheel --sdist
      - name: Validate package
        run: twine check dist/*
