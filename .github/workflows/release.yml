name: Release acgs-lite

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create GitHub Releases and upload assets
  id-token: write   # PyPI Trusted Publisher (OIDC) — no token needed

jobs:
  # ── 1. Build ────────────────────────────────────────────────────────────────
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: /tmp/.uv-cache
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install build deps
        run: uv pip install --system build twine

      - name: Build wheel and sdist
        working-directory: packages/acgs-lite
        run: python -m build

      - name: Validate distributions
        working-directory: packages/acgs-lite
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: packages/acgs-lite/dist/
          if-no-files-found: error

  # ── 2. GitHub Release ───────────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for changelog generation

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]' | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s" --no-merges | head -20)
          fi
          {
            echo "changes<<EOF"
            echo "$CHANGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "acgs-lite ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          body: |
            ## acgs-lite ${{ github.ref_name }}

            Constitutional AI governance for any agent. Wrap any LLM agent in enforceable rules, audit trails, and MACI separation of powers.

            ### Install

            ```bash
            pip install acgs-lite==${{ steps.version.outputs.version }}
            # or with all LLM integrations:
            pip install "acgs-lite[all]==${{ steps.version.outputs.version }}"
            ```

            ### Changes
            ${{ steps.changelog.outputs.changes }}

            ### Constitutional Hash
            `cdd01ef066bc6cf2` — embedded in all validation paths.

            ---
            **[Documentation](https://acgs.dev/docs/lite)** · **[PyPI](https://pypi.org/project/acgs-lite/)** · **[Repository](https://github.com/acgs-ai/acgs-lite)**
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'a') || contains(github.ref_name, 'b') || contains(github.ref_name, 'rc') }}

  # ── 3. Publish to PyPI (Trusted Publisher — no token required) ─────────────
  pypi-publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/acgs-lite

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          print-hash: true
          verbose: true
