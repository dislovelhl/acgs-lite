name: Release acgs-lite

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create GitHub Releases and upload assets

jobs:
  # ── 1. Build Python distribution ───────────────────────────────────────────
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Build wheel and sdist
        working-directory: packages/acgs-lite
        run: uv build

      - name: Validate distributions
        working-directory: packages/acgs-lite
        run: uvx twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: packages/acgs-lite/dist/
          if-no-files-found: error

  # ── 2. Build paper PDFs (optional — does not block release) ─────────────────
  build-paper:
    name: Build paper PDF (${{ matrix.mode }})
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        mode: [generic, neurips, icml]
        submission: [camera-ready]
    defaults:
      run:
        working-directory: docs/generated
    steps:
      - uses: actions/checkout@v4

      - name: Install LaTeX toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            latexmk \
            lmodern \
            texlive-fonts-recommended \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-latex-recommended \
            texlive-pictures

      - name: Show detected tools
        run: make check-tools

      - name: Build ${{ matrix.mode }} (${{ matrix.submission }}) PDF
        run: make paper MODE=${{ matrix.mode }} SUBMISSION=${{ matrix.submission }}

      - name: Upload paper artifacts
        uses: actions/upload-artifact@v4
        with:
          name: paper-${{ matrix.mode }}-${{ matrix.submission }}
          path: docs/generated/dist/acgs_arxiv_skeleton-${{ matrix.mode }}-${{ matrix.submission }}.pdf
          if-no-files-found: warn

  # ── 3. GitHub Release ───────────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for changelog generation

      - name: Download Python build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]' | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s" --no-merges | head -20)
          fi
          {
            echo "changes<<EOF"
            echo "$CHANGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "acgs-lite ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          body: |
            ## acgs-lite ${{ github.ref_name }}

            Constitutional AI governance for any agent. Wrap any LLM agent in enforceable rules, audit trails, and MACI separation of powers.

            ### Install

            ```bash
            pip install acgs-lite==${{ steps.version.outputs.version }}
            # or with all LLM integrations:
            pip install "acgs-lite[all]==${{ steps.version.outputs.version }}"
            ```

            ### Changes
            ${{ steps.changelog.outputs.changes }}

            ### Constitutional Hash
            `608508a9bd224290` — embedded in all validation paths.

            ---
            **[Documentation](https://acgs.ai)** · **[PyPI](https://pypi.org/project/acgs-lite/)** · **[Repository](https://github.com/acgs2_admin/acgs)**
          files: |
            dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'a') || contains(github.ref_name, 'b') || contains(github.ref_name, 'rc') }}

  # ── 4. Publish to PyPI ────────────────────────────────────────────────────
  pypi-publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/acgs-lite/

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: uv publish dist/ --skip-existing
