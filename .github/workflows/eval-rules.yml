name: Eval Rules

on:
  pull_request:
    paths:
      - "packages/acgs-lite/src/acgs_lite/engine/**"
      - "packages/acgs-lite/src/acgs_lite/constitution/**"
      - "packages/acgs-lite/src/acgs_lite/matcher.py"
      - "autoresearch/constitution.yaml"
      - "autoresearch/eval_data/**"
      - "autoresearch/eval_rules.py"
  push:
    branches: [main]
    paths:
      - "packages/acgs-lite/src/acgs_lite/engine/**"
      - "packages/acgs-lite/src/acgs_lite/constitution/**"
      - "packages/acgs-lite/src/acgs_lite/matcher.py"
      - "autoresearch/constitution.yaml"
      - "autoresearch/eval_data/**"
      - "autoresearch/eval_rules.py"

concurrency:
  group: eval-rules-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  UV_CACHE_DIR: /tmp/.uv-cache

jobs:
  eval-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-${{ runner.os }}-
      - name: Install dependencies
        run: make setup
      - name: Run per-rule eval harness
        run: make eval-rules
      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: eval_results/
          retention-days: 30
      - name: Check for regressions
        run: |
          # Fail if any scenario failed
          python3 -c "
          import json, sys
          with open('eval_results/rule_metrics.json') as f:
              data = json.load(f)
          sm = data['scenario_metrics']
          if sm['incorrect'] > 0 or sm['errors'] > 0:
              print(f'REGRESSION: {sm[\"incorrect\"]} incorrect, {sm[\"errors\"]} errors')
              # Show which rules degraded
              for rid, rm in data['rule_metrics'].items():
                  if rm['false_negatives'] > 0 or rm['false_positives'] > 0:
                      print(f'  {rid}: FP={rm[\"false_positives\"]} FN={rm[\"false_negatives\"]} F1={rm[\"f1_score\"]}')
              sys.exit(1)
          print(f'PASS: {sm[\"correct\"]}/{sm[\"total\"]} scenarios correct, {sm[\"accuracy\"]:.1%} accuracy')
          "
      - name: Post eval summary to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('eval_results/summary.md', 'utf8');
            const body = `## 🔍 Per-Rule Eval Results\n\n${summary}\n\n<sub>Generated by \`make eval-rules\`</sub>`;
            
            // Find existing comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c => c.body.includes('Per-Rule Eval Results'));
            
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
