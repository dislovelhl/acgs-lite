name: Feature Request
description: Suggest a feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for suggesting a feature! Please fill out the details below.
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem does this solve? What's the use case?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Constitution / Rules
        - Governance Engine
        - MACI Enforcement
        - Compliance / EU AI Act
        - Integrations
        - CLI
        - Audit Trail
        - Other
