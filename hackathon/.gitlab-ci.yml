# Constitutional Sentinel — Full GitLab CI/CD Pipeline
#
# This pipeline demonstrates the complete ACGS governance workflow:
#   1. build    — standard build/test
#   2. sentinel — Constitutional Sentinel validates MR diffs (ACGS-Lite)
#   3. deploy   — deploys only after governance approval
#
# Setup:
#   1. Deploy the Constitutional Sentinel to Cloud Run (see cloud-run-deploy.sh)
#   2. Register the Cloud Run URL as a GitLab webhook (MR events only)
#   3. Set these CI/CD variables (Settings > CI/CD > Variables):
#        GITLAB_TOKEN          — api scope token
#        GITLAB_WEBHOOK_SECRET — webhook shared secret
#        CLOUD_RUN_URL         — https://acgs-sentinel-xxxx-uc.a.run.app
#
# GitLab AI Hackathon 2026 — Constitutional AI Governance

stages:
  - build
  - sentinel
  - deploy

# ---------------------------------------------------------------------------
# Standard build/test (runs on all pipelines)
# ---------------------------------------------------------------------------
build:
  stage: build
  image: python:3.11-slim
  script:
    - pip install --quiet -e ".[dev]"
    - python -m pytest tests/ -x -q --import-mode=importlib
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---------------------------------------------------------------------------
# Constitutional Sentinel: AI governance validation
#
# Runs ONLY on MR pipelines. Validates every diff line against the
# constitution. Posts inline comments + governance report. Blocks on
# CRITICAL or HIGH violations.
# ---------------------------------------------------------------------------
constitutional-sentinel:
  stage: sentinel
  image: python:3.11-slim
  variables:
    CONSTITUTION_PATH: "hackathon/constitution.yaml"
  before_script:
    - pip install --quiet "acgs-lite[gitlab]"
  script:
    - |
      python3 - <<'EOF'
      import asyncio
      import os
      import sys

      from acgs_lite import Constitution
      from acgs_lite.integrations.gitlab import GitLabGovernanceBot


      async def main() -> int:
          token = os.environ.get("GITLAB_TOKEN")
          if not token:
              print("ERROR: GITLAB_TOKEN not set")
              return 1

          project_id = int(os.environ["CI_PROJECT_ID"])
          mr_iid = int(os.environ.get("CI_MERGE_REQUEST_IID", "0"))
          if mr_iid == 0:
              print("Not a merge request pipeline — skipping governance check")
              return 0

          constitution_path = os.environ.get("CONSTITUTION_PATH", "hackathon/constitution.yaml")
          try:
              constitution = Constitution.from_yaml(constitution_path)
          except FileNotFoundError:
              # Fall back to built-in GitLab template
              constitution = Constitution.from_template("gitlab")
              print(f"WARNING: {constitution_path} not found, using built-in gitlab template")

          print(f"Constitutional hash: {constitution.hash}")
          print(f"Rules loaded: {len(constitution.rules)}")

          bot = GitLabGovernanceBot(
              token=token,
              project_id=project_id,
              constitution=constitution,
          )

          report = await bot.run_governance_pipeline(mr_iid=mr_iid)

          print(f"\nGovernance result: {'PASSED' if report.passed else 'FAILED'}")
          print(f"  Risk score:  {report.risk_score:.2f}")
          print(f"  Violations:  {len(report.violations)}")
          print(f"  Warnings:    {len(report.warnings)}")
          print(f"  Rules checked: {report.rules_checked}")

          if report.violations:
              print("\nViolations:")
              for v in report.violations:
                  loc = f" ({v.get('file')}:{v.get('line')})" if v.get("file") else ""
                  print(f"  [{v['severity'].upper()}] {v['rule_id']}: {v.get('rule_text', '')}{loc}")

          # Exit 1 blocks the pipeline (and therefore the merge)
          return 0 if report.passed else 1


      sys.exit(asyncio.run(main()))
      EOF
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ---------------------------------------------------------------------------
# Governance posture check (optional: runs on default branch pushes)
# Reports current compliance stats via Cloud Run /governance/summary
# ---------------------------------------------------------------------------
governance-posture:
  stage: sentinel
  image: python:3.11-slim
  script:
    - |
      if [ -n "$CLOUD_RUN_URL" ]; then
        pip install --quiet httpx
        python3 - <<'EOF'
      import httpx, sys, json

      url = __import__("os").environ["CLOUD_RUN_URL"].rstrip("/")
      r = httpx.get(f"{url}/governance/summary", timeout=10)
      data = r.json()
      print(f"Constitutional hash: {data['constitutional_hash']}")
      summary = data.get("summary", {})
      for k, v in summary.items():
          print(f"  {k}: {v}")
      EOF
      else
        echo "CLOUD_RUN_URL not set — skipping posture check"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  allow_failure: true

# ---------------------------------------------------------------------------
# Deploy (only after sentinel passes)
# ---------------------------------------------------------------------------
deploy:
  stage: deploy
  image: google/cloud-sdk:slim
  script:
    - echo "Deploying after constitutional clearance..."
    - gcloud run deploy acgs-sentinel
        --source /app
        --region us-central1
        --allow-unauthenticated
        --set-env-vars "GITLAB_TOKEN=${GITLAB_TOKEN},GITLAB_PROJECT_ID=${CI_PROJECT_ID}"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  environment:
    name: production
    url: $CLOUD_RUN_URL
