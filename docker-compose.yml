services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  opa:
    image: openpolicyagent/opa:latest-static
    ports:
      - "8181:8181"
    command: run --server --addr 0.0.0.0:8181

  agent-bus:
    build:
      context: .
      target: agent-bus
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379
      OPA_URL: http://opa:8181
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres
      CONSTITUTIONAL_HASH: cdd01ef066bc6cf2
      MACI_STRICT_MODE: "true"
      ACGS2_SERVICE_SECRET: dev-secret-do-not-use-in-prod
    volumes:
      - ./packages/enhanced_agent_bus:/app/packages/enhanced_agent_bus
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      target: api-gateway
    ports:
      - "8080:8080"
    environment:
      REDIS_URL: redis://redis:6379
      AGENT_BUS_URL: http://agent-bus:8000
      CONSTITUTIONAL_HASH: cdd01ef066bc6cf2
      ACGS2_SERVICE_SECRET: dev-secret-do-not-use-in-prod
    volumes:
      - ./src:/app/src
    depends_on:
      - agent-bus
