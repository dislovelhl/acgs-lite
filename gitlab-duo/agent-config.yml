# ACGS-Lite Governance Agent — Runner Execution Configuration
# Constitutional Hash: cdd01ef066bc6cf2
#
# Configures the GitLab Runner environment for the ACGS governance agent.
# Used by GitLab Duo to set up the execution context for agent flows.

image: python:3.11-slim

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"
  ACGS_CONSTITUTIONAL_HASH: "cdd01ef066bc6cf2"

setup_script:
  - apt-get update -qq && apt-get install -y -qq --no-install-recommends git curl jq > /dev/null 2>&1
  - pip install --quiet --no-cache-dir
      acgs-lite[mcp]>=0.2.0
      pydantic>=2.0
      pyyaml>=6.0
      httpx>=0.27
  # Verify installation and constitutional hash
  - >-
      python3 -c
      "from acgs_lite.constitution import Constitution;
      c = Constitution.default();
      expected = '${ACGS_CONSTITUTIONAL_HASH}';
      assert c.hash == expected, 'Hash mismatch';
      print('ACGS-Lite ready', c.name, c.version, c.hash)"
  # Install glab CLI for GitLab API operations
  - curl -sSL "https://gitlab.com/gitlab-org/cli/-/releases/permalink/latest/downloads/glab_linux_amd64.deb"
      -o /tmp/glab.deb && dpkg -i /tmp/glab.deb > /dev/null 2>&1 && rm /tmp/glab.deb

cache:
  key: acgs-governance-agent-pip
  paths:
    - .pip-cache/
  policy: pull-push

network_policy:
  # Allow outbound access to GitLab API for posting MR notes and fetching diffs
  allow:
    - host: "*.gitlab.com"
      port: 443
    - host: "*.gitlab.io"
      port: 443
    # Allow internal GitLab instance (self-managed)
    - host: "${CI_SERVER_HOST}"
      port: 443
    # Allow PyPI for package installation
    - host: "pypi.org"
      port: 443
    - host: "files.pythonhosted.org"
      port: 443

resource_limits:
  cpu: "1"
  memory: "512Mi"
  timeout: 300

health_check:
  command: python3 -c "from acgs_lite.engine import GovernanceEngine; print('healthy')"
  interval: 60
  retries: 3
