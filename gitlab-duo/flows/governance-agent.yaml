# ACGS-Lite Governance Agent — GitLab Duo External Agent Flow
# Constitutional Hash: cdd01ef066bc6cf2
#
# Triggers: MR creation, MR update, manual @mention in MR comments.
# Reads MR diffs from AI_FLOW_CONTEXT, runs acgs-lite constitutional
# validation, MACI separation-of-powers checks, and EU AI Act compliance,
# then posts a structured governance report as an MR note.

name: acgs-governance-agent
description: >
  Constitutional AI governance agent powered by acgs-lite.
  Validates merge requests against constitutional rules, enforces MACI
  separation of powers, and checks EU AI Act compliance for high-risk
  AI system changes.

injectGatewayToken: true

image: python:3.11-slim

setup: |
  set -euo pipefail
  pip install --quiet --no-cache-dir \
    acgs-lite[mcp]>=0.2.0 \
    pyyaml>=6.0 \
    pydantic>=2.0 \
    httpx>=0.27

  # Verify acgs-lite is importable and print constitutional hash
  python3 -c "
  from acgs_lite.constitution import Constitution
  c = Constitution.default()
  print(f'acgs-lite loaded: {c.name} v{c.version} hash={c.hash}')
  "

system_prompt: |
  You are the ACGS Constitutional Governance Agent. Your role is to review
  merge requests against constitutional governance rules using the acgs-lite
  library.

  ## Your capabilities

  1. **Constitutional Validation** — Validate code changes against 6 core
     governance rules (ACGS-001 through ACGS-006) covering integrity, audit,
     access control, MACI separation of powers, hash verification, and data
     protection.

  2. **MACI Separation of Powers** — Enforce that the MR author (proposer)
     is never the same person who approves (validator). Check for self-approval
     patterns in the diff.

  3. **EU AI Act Compliance** — When changes touch AI/ML code, classify the
     system's risk level (Article 6 + Annex III), check Article 12
     record-keeping, Article 13 transparency, and Article 14 human oversight
     requirements.

  4. **Context Risk Scoring** — Score the operational context (production,
     staging, test) to modulate governance strictness.

  5. **Escalation Routing** — Recommend escalation tiers (TIER_0 auto-approve
     through TIER_4 hard-block) based on combined severity, context risk, and
     action risk signals.

  ## How to review an MR

  1. Read the MR diff from the context provided.
  2. For each changed file, extract the actions being performed (new functions,
     modified logic, configuration changes, dependency updates).
  3. Run each action through `GovernanceEngine.validate()` to check
     constitutional compliance.
  4. Check MACI: ensure the MR author is not self-approving. Flag if the diff
     contains self-validation or auto-approve patterns.
  5. If the changes involve AI/ML systems (model training, inference, scoring,
     decision-making), run EU AI Act risk classification.
  6. Produce a structured governance report.

  ## Report format

  Post the report as an MR comment with this structure:

  ```
  ## ACGS Governance Report

  **Constitutional Hash:** `<hash>`
  **Decision:** APPROVE | FLAG | BLOCK
  **Rules Checked:** N
  **Violations:** N (M blocking, K warnings)

  ### Constitutional Compliance
  - [PASS/FAIL] ACGS-001: Self-modification protection
  - [PASS/FAIL] ACGS-002: Audit trail completeness
  - ...

  ### MACI Separation of Powers
  - Author: @username (proposer)
  - Reviewer: [assigned/unassigned]
  - Self-approval check: PASS/FAIL

  ### EU AI Act Compliance (if applicable)
  - Risk Level: [UNACCEPTABLE/HIGH_RISK/LIMITED/MINIMAL]
  - Article 12 (Record-Keeping): [status]
  - Article 13 (Transparency): [status]
  - Article 14 (Human Oversight): [status]

  ### Context Risk
  - Risk Score: 0.0-1.0
  - Handling Tier: maximum/elevated/standard/relaxed
  - Signals: [matched signals]

  ### Escalation
  - Tier: TIER_0..TIER_4
  - SLA: [response time]
  - Requires Human: yes/no
  ```

  ## Decision criteria

  - **APPROVE**: Zero blocking violations, MACI check passes, context risk < 0.7
  - **FLAG**: Non-blocking violations (medium/low severity), or context risk >= 0.4
  - **BLOCK**: Any blocking violation (critical/high severity), MACI failure, or
    credential exposure detected

  Always be precise and actionable. Reference specific rule IDs and line numbers.

steps:
  - name: read-context
    run: |
      cat <<'PYEOF' > /tmp/governance_review.py
      """ACGS governance review for GitLab Duo agent flow."""
      import json
      import os
      import subprocess
      import sys

      from acgs_lite.constitution import Constitution, governance_decision_report
      from acgs_lite.engine import GovernanceEngine
      from acgs_lite.audit import AuditLog
      from acgs_lite.maci import MACIEnforcer, MACIRole

      # --- Read flow environment variables ---
      context_raw = os.environ.get("AI_FLOW_CONTEXT", "{}")
      user_input = os.environ.get("AI_FLOW_INPUT", "")
      event_type = os.environ.get("AI_FLOW_EVENT", "merge_request")

      try:
          context = json.loads(context_raw)
      except json.JSONDecodeError:
          context = {"raw": context_raw}

      # --- Extract MR metadata ---
      mr_iid = context.get("merge_request", {}).get("iid", "")
      mr_author = context.get("merge_request", {}).get("author", {}).get("username", "unknown")
      mr_title = context.get("merge_request", {}).get("title", "")
      project_path = context.get("project", {}).get("path_with_namespace", "")
      diffs = context.get("diffs", [])

      # If diffs not in context, fetch via glab CLI
      if not diffs and mr_iid and project_path:
          try:
              result = subprocess.run(
                  ["glab", "api", f"projects/{project_path}/merge_requests/{mr_iid}/diffs"],
                  capture_output=True, text=True, timeout=30,
              )
              if result.returncode == 0:
                  diffs = json.loads(result.stdout)
          except (subprocess.SubprocessError, json.JSONDecodeError):
              pass

      # --- Initialize governance engine ---
      constitution = Constitution.default()
      audit_log = AuditLog()
      engine = GovernanceEngine(constitution, audit_log=audit_log, strict=False)

      # --- Initialize MACI enforcer ---
      maci = MACIEnforcer(audit_log=audit_log)
      maci.assign_role(mr_author, MACIRole.PROPOSER)

      # --- Validate each diff ---
      all_results = []
      actions_from_diffs = []

      for diff in diffs:
          if isinstance(diff, dict):
              file_path = diff.get("new_path", diff.get("old_path", "unknown"))
              patch = diff.get("diff", diff.get("patch", ""))
          elif isinstance(diff, str):
              file_path = "unknown"
              patch = diff
          else:
              continue

          # Extract action description from diff
          action_text = f"modify {file_path}: {patch[:500]}"
          actions_from_diffs.append({"file": file_path, "action": action_text})

          # Run governance validation
          result = engine.validate(action_text, agent_id=mr_author)
          all_results.append({
              "file": file_path,
              "valid": result.valid,
              "violations": [
                  {
                      "rule_id": v.rule_id,
                      "severity": v.severity.value,
                      "rule_text": v.rule_text,
                      "category": v.category,
                  }
                  for v in result.violations
              ],
              "rules_checked": result.rules_checked,
              "constitutional_hash": result.constitutional_hash,
          })

      # --- Run governance decision report on MR title + description ---
      mr_report = governance_decision_report(
          action=f"{mr_title} by {mr_author}",
          context={"environment": "merge_request", "project": project_path},
          rules=constitution.active_rules(),
      )

      # --- MACI self-approval check ---
      assignees = context.get("merge_request", {}).get("assignees", [])
      reviewers = context.get("merge_request", {}).get("reviewers", [])
      reviewer_usernames = [r.get("username", "") for r in reviewers]

      maci_violation = mr_author in reviewer_usernames

      # --- Compile output for the LLM ---
      output = {
          "event_type": event_type,
          "user_input": user_input,
          "mr_iid": mr_iid,
          "mr_author": mr_author,
          "mr_title": mr_title,
          "project_path": project_path,
          "constitutional_hash": constitution.hash,
          "constitution_version": constitution.version,
          "diff_count": len(diffs),
          "validation_results": all_results,
          "mr_governance_report": mr_report,
          "maci_self_approval": maci_violation,
          "maci_author_role": "proposer",
          "reviewer_usernames": reviewer_usernames,
          "engine_stats": engine.stats,
      }

      print(json.dumps(output, indent=2, default=str))
      PYEOF

      python3 /tmp/governance_review.py

  - name: post-report
    run: |
      # The LLM formats the governance report from the previous step's output.
      # This step posts the formatted report as an MR note via glab CLI.
      if [ -n "${GOVERNANCE_REPORT:-}" ] && [ -n "${CI_PROJECT_PATH:-}" ] && [ -n "${MR_IID:-}" ]; then
        glab api --method POST \
          "projects/${CI_PROJECT_PATH}/merge_requests/${MR_IID}/notes" \
          -f "body=${GOVERNANCE_REPORT}"
      fi
