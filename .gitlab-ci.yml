workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_BRANCH =~ /^fix\/.+/'
    - if: '$CI_COMMIT_BRANCH =~ /^feat\/.+/'
    - when: never

stages:
  - verify

default:
  image: node:20-bookworm
  interruptible: true
  variables:
    UV_CACHE_DIR: "$CI_PROJECT_DIR/.uv-cache"
    NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"
    DEBIAN_FRONTEND: noninteractive
    PIP_DISABLE_PIP_VERSION_CHECK: "1"
  cache:
    key:
      files:
        - uv.lock
        - packages/propriety-ai/package-lock.json
    paths:
      - .uv-cache/
      - .npm/
    policy: pull-push
  before_script:
    - apt-get update -qq
    - apt-get install -y --no-install-recommends python3 python3-venv python3-pip make curl git ca-certificates
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - export PATH="$HOME/.local/bin:$PATH"
    - python3 --version && node --version && uv --version
    - make setup

lint:
  stage: verify
  script:
    - make lint
    - make health-bus-wrappers

test-quick:
  stage: verify
  script:
    - make test-quick

test-full:
  stage: verify
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - when: never
  script:
    - make test
