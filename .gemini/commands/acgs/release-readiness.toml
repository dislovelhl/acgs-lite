name = "release-readiness"
description = "Assess whether a change is ready to merge or release in this workspace."
prompt = """
Assess release readiness using this repo's workspace conventions.
Check:
- relevant evals defined and passing
- narrowest meaningful tests run
- docs updated if behavior changed
- security and fail-closed constraints preserved
Return:
- status: GO / HOLD
- required follow-ups
- exact verification commands to run next
"""
