# Constitutional Token Vault Policy
# ACGS-Auth0 Demo Constitution
#
# Constitutional Hash: 608508a9bd224290
#
# This constitution defines which MACI roles are allowed to request
# which OAuth scopes from which external providers via Auth0 Token Vault.
#
# The JUDICIAL role never appears here — it validates proposals but does
# not itself access external APIs (MACI Golden Rule: no self-validation).

token_vault:
  constitutional_hash: "608508a9bd224290"
  connections:

    # ---------------------------------------------------------------
    # GitHub
    # ---------------------------------------------------------------
    github:
      # EXECUTIVE (Proposer): read-only — can list issues, repos, PRs
      EXECUTIVE:
        permitted_scopes:
          - read:user
          - repo:read
        high_risk_scopes: []

      # IMPLEMENTER (Executor): read + write — can create PRs, commit code
      # Write operations require CIBA step-up approval from the user
      IMPLEMENTER:
        permitted_scopes:
          - read:user
          - repo:read
          - repo:write
          - pull_request:write
        high_risk_scopes:
          - repo:write
          - pull_request:write

      # MONITOR: read-only audit access
      MONITOR:
        permitted_scopes:
          - read:user
          - repo:read
        high_risk_scopes: []

    # ---------------------------------------------------------------
    # Google (Calendar + Docs)
    # ---------------------------------------------------------------
    google-oauth2:
      # EXECUTIVE: can check calendar availability (freebusy), read-only
      EXECUTIVE:
        permitted_scopes:
          - openid
          - profile
          - email
          - https://www.googleapis.com/auth/calendar.freebusy
          - https://www.googleapis.com/auth/calendar.events.readonly
        high_risk_scopes: []

      # IMPLEMENTER: can create/modify calendar events (requires step-up)
      IMPLEMENTER:
        permitted_scopes:
          - openid
          - profile
          - email
          - https://www.googleapis.com/auth/calendar
          - https://www.googleapis.com/auth/calendar.events
          - https://www.googleapis.com/auth/drive.file
        high_risk_scopes:
          - https://www.googleapis.com/auth/calendar.events
          - https://www.googleapis.com/auth/calendar
          - https://www.googleapis.com/auth/drive.file

    # ---------------------------------------------------------------
    # Slack
    # ---------------------------------------------------------------
    slack:
      # EXECUTIVE: can read channels and messages
      EXECUTIVE:
        permitted_scopes:
          - channels:read
          - channels:history
          - users:read
        high_risk_scopes: []

      # IMPLEMENTER: can post messages (requires step-up for public channels)
      IMPLEMENTER:
        permitted_scopes:
          - channels:read
          - channels:history
          - users:read
          - chat:write
        high_risk_scopes:
          - chat:write
