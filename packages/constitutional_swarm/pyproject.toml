[project]
name = "constitutional-swarm"
version = "0.1.0"
description = "Constitutional Swarm Mesh — orchestrator-free multi-agent governance via embedded Agent DNA"
readme = "README.md"
requires-python = ">=3.11"
license = "AGPL-3.0-or-later"
dependencies = ["acgs"]

[project.urls]
Homepage = "https://acgs.ai"
Documentation = "https://github.com/dislovelhl/acgs/tree/main/packages/constitutional_swarm"
Repository = "https://github.com/dislovelhl/acgs"
Issues = "https://github.com/dislovelhl/acgs/issues"
Changelog = "https://github.com/dislovelhl/acgs/releases"
PyPI = "https://pypi.org/project/constitutional-swarm/"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=1.0"]
bittensor = ["bittensor>=7.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/constitutional_swarm"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
markers = [
  "slow: marks tests as slow (800+ agent scale)",
  "integration: marks cross-package integration tests",
  "contract: marks stable cross-package contract tests"
]
