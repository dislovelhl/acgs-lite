[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "acgs"
version = "1.0.0a1"
description = "Thin public ACGS namespace package backed by acgs-lite"
readme = "README.md"
requires-python = ">=3.10"
license = "AGPL-3.0-or-later"
keywords = ["ai", "governance", "constitutional", "agent", "maci"]
dependencies = [
    "acgs-lite>=2.5",
    "pydantic>=2.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
cedar = ["cedarpy>=4.0"]
fastapi = ["fastapi>=0.100", "uvicorn>=0.20"]
anthropic = ["anthropic>=0.20"]
openai = ["openai>=1.0"]
langchain = ["langchain-core>=0.2"]

[project.urls]
Homepage = "https://acgs.ai"
Documentation = "https://github.com/dislovelhl/acgs/tree/main/packages/acgs-core"
Repository = "https://github.com/dislovelhl/acgs"
Issues = "https://github.com/dislovelhl/acgs/issues"
Changelog = "https://github.com/dislovelhl/acgs/releases"
PyPI = "https://pypi.org/project/acgs/"

[tool.hatch.build.targets.wheel]
packages = ["src/acgs"]
