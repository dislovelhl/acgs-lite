[project]
name = "mhc"
version = "0.1.0"
description = "Multi-agent Hierarchical Constitutional governance — re-export of constitutional-swarm"
readme = "README.md"
requires-python = ">=3.11"
license = "AGPL-3.0-or-later"
dependencies = ["constitutional-swarm"]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=1.0"]

[project.urls]
Homepage = "https://acgs.ai"
Documentation = "https://github.com/dislovelhl/acgs/tree/main/packages/mhc"
Repository = "https://github.com/dislovelhl/acgs"
Issues = "https://github.com/dislovelhl/acgs/issues"
Changelog = "https://github.com/dislovelhl/acgs/releases"
PyPI = "https://pypi.org/project/mhc/"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mhc"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
