[project]
name = "omalhc"
version = "0.1.0"
description = "Constitutional Swarm Mesh — orchestrator-free multi-agent governance via embedded Agent DNA"
requires-python = ">=3.11"
dependencies = ["acgs-lite"]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=1.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/omalhc"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
