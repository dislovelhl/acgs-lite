name: Healthcare AI Constitution v1.0
version: "1.0.0"
description: >
  Constitutional rules governing AI-assisted clinical decision support.
  Enforces MACI separation of powers, drug safety standards, HIPAA data
  handling, and clinical evidence requirements.
  Every rule has keywords and patterns so GovernanceEngine fires them.

# CRITICAL: Structural governance
rules:
  - id: HC-001
    severity: critical
    category: governance
    text: >
      No clinical action may be executed without MACI validation.
      The agent proposing a clinical action cannot also validate or approve it.
    keywords:
      - "self-approve"
      - "auto-approve"
      - "skip validation"
      - "bypass governance"
      - "self-validate"
    patterns:
      - "self.?approv"
      - "auto.?approv"
      - "bypass.{0,20}(validation|maci|governance)"
      - "skip.{0,20}(validation|maci|governance)"

  - id: HC-002
    severity: critical
    category: evidence
    text: >
      Clinical proposals must explicitly state their evidence tier:
      FDA-approved, ACR/ADA/AHA guideline, RCT-supported, or off-label.
      Off-label use triggers CRITICAL risk tier and requires human review.
    keywords:
      - "off-label"
      - "unapproved indication"
      - "compassionate use"
      - "experimental use"
    patterns:
      - "off.?label"
      - "unapproved.{0,20}(use|indication)"
      - "experimental.{0,20}(use|treatment)"

  - id: HC-003
    severity: critical
    category: privacy
    text: >
      No real Protected Health Information (PHI) may appear in agent inputs
      or outputs. All patient references must use synthetic or
      de-identified identifiers (e.g., SYNTH-042, PATIENT-001).
    keywords:
      - "social security"
      - "date of birth"
      - "home address"
      - "phone number"
      - "real patient"
    patterns:
      - "\\b\\d{3}-\\d{2}-\\d{4}\\b"
      - "(?i)(mrn|medical record number)\\s*:\\s*[A-Z]{0,3}\\d{5,}"
      - "(?i)patient name\\s*:\\s*[A-Z][a-z]+"

# HIGH: Drug safety
  - id: HC-004
    severity: high
    category: step_therapy
    text: >
      Step therapy is required before approving advanced or biologic therapies.
      Prior treatment history must be documented in the proposal.
      ACR/AHA/ADA guidelines require first-line therapy trials before escalation.
    keywords:
      - "no prior treatment"
      - "first-line"
      - "step therapy"
      - "without prior"
      - "no previous treatment"
      - "skipping step"
    patterns:
      - "no (prior|previous).{0,20}treatment"
      - "without.{0,20}(mtx|methotrexate|step|first.?line)"
      - "skip.{0,20}step.{0,10}therapy"

  - id: HC-005
    severity: high
    category: drug_interaction
    text: >
      Drug interactions and contraindications must be checked against the
      patient's current medication list before proposing any new medication.
      Phrases like 'no interaction check', 'skip drug interaction', or
      'ignore contraindication' are red flags. Complex clinical interactions
      (e.g., Warfarin + Aspirin) are evaluated by the LLM reasoning layer.
    keywords:
      - "skip interaction check"
      - "no interaction check"
      - "skip drug interaction"
      - "ignore contraindication"
      - "contraindicated but prescribe"
    patterns:
      - "(skip|ignore|bypass|no).{0,30}(interaction|contraindication)"
      - "contraindicated.{0,30}but.{0,20}(prescribe|administer|give|order)"

  - id: HC-006
    severity: high
    category: escalation
    text: >
      Any CRITICAL risk tier decision must be escalated to a human clinician
      before execution. The audit trail must record the human review outcome.
      Bypassing human review for critical decisions is prohibited.
    keywords:
      - "skip human review"
      - "bypass escalation"
      - "no human required"
      - "auto-execute critical"
    patterns:
      - "(skip|bypass|ignore).{0,20}(human|clinician|physician).{0,20}review"
      - "auto.?execut.{0,20}critical"

  - id: HC-007
    severity: high
    category: dosing
    text: >
      Dosing proposals must fall within FDA-approved or guideline-recommended
      ranges. Supratherapeutic doses require explicit justification and CRITICAL
      risk tier routing. Phrases like "10x dose", "double dose", or doses that
      "exceed the maximum" are automatically flagged.
    keywords:
      - "10x dose"
      - "double dose"
      - "triple dose"
      - "overdose"
      - "supratherapeutic"
      - "exceeds maximum"
      - "exceed guideline"
    patterns:
      - "(\\d+x|double|triple|quadruple).{0,20}(dose|dosing|the.{0,10}standard)"
      - "exceed.{0,20}(maximum|max|guideline|recommended).{0,20}dose"
      - "supra.?therapeutic"

  - id: HC-008
    severity: high
    category: narrow_therapeutic_index
    text: >
      Narrow therapeutic index (NTI) drugs require a monitoring plan.
      NTI drugs include: Warfarin, Digoxin, Lithium, Phenytoin, Cyclosporine,
      Tacrolimus, Theophylline, Levothyroxine. Proposals involving NTI drugs
      without a monitoring plan are flagged.
    keywords:
      - "without monitoring"
      - "no monitoring plan"
      - "no INR check"
      - "no drug level"
    patterns:
      - "(warfarin|digoxin|lithium|phenytoin|cyclosporine|tacrolimus|theophylline).{0,80}(without|no).{0,20}(monitor|INR|level|check)"

# MEDIUM: Clinical standards
  - id: HC-009
    severity: medium
    category: black_box_warning
    text: >
      Drugs with FDA black-box warnings require explicit acknowledgment and
      documented justification in the proposal. REMS program drugs require
      verification that patient is enrolled.
    keywords:
      - "black box"
      - "boxed warning"
      - "rems program"
      - "fda warning"
    patterns:
      - "black.?box.{0,40}(drug|medication|without|bypass|skip)"
      - "rems.{0,30}(bypass|skip|not enrolled|waive)"

  - id: HC-010
    severity: medium
    category: pediatric
    text: >
      Pediatric dosing must use weight-based calculations (mg/kg).
      Adult doses must not be applied to pediatric patients.
      Age ranges: neonate (<1mo), infant (1-12mo), child (1-12y), adolescent (12-18y).
    keywords:
      - "adult dose"
      - "standard adult"
      - "pediatric"
      - "child"
      - "infant"
      - "neonatal"
    patterns:
      - "adult.{0,30}dose.{0,40}(child|pediatric|infant|neonate)"
      - "standard.{0,20}adult.{0,30}(child|pediatric)"
      - "pediatric.{0,40}without.{0,20}(weight|mg.?kg|dose.?calculat)"

  - id: HC-011
    severity: medium
    category: renal_hepatic
    text: >
      Renal or hepatic impairment requires dose adjustment for renally or
      hepatically cleared drugs. Standard adult doses must not be used without
      verifying organ function.
    keywords:
      - "renal impairment"
      - "hepatic impairment"
      - "ckd"
      - "egfr"
      - "creatinine clearance"
      - "liver failure"
      - "cirrhosis"
    patterns:
      - "(renal|hepatic|kidney|liver).{0,30}(impairment|failure|disease).{0,80}(standard|full|normal).{0,20}dose"
      - "egfr.{0,30}(without|no).{0,20}(adjust|reduce|dose)"

  - id: HC-012
    severity: medium
    category: pregnancy
    text: >
      Pregnancy safety classification must be checked for any medication
      proposed to pregnant patients. Category X and Category D medications
      require explicit justification and mandatory CRITICAL escalation.
    keywords:
      - "pregnant"
      - "pregnancy"
      - "fetal risk"
      - "teratogenic"
      - "category x"
      - "category d"
    patterns:
      - "pregnant.{0,80}(category.?[dx]|teratogenic|contraindicated)"
      - "(category.?x|teratogenic).{0,60}(without|no).{0,20}(justif|approv|escalat)"

  - id: HC-013
    severity: medium
    category: audit
    text: >
      All governance decisions must be recorded in the tamper-evident audit log
      with constitutional hash, timestamp, and full reasoning chain.
      Disabling or bypassing audit logging is prohibited.
    keywords:
      - "no audit"
      - "skip audit"
      - "disable logging"
      - "bypass audit"
      - "no log"
    patterns:
      - "(skip|disable|bypass|no).{0,20}(audit|logging|trail|log)"

  - id: HC-014
    severity: medium
    category: appeal
    text: >
      Denied clinical actions must include an appeal path and the specific
      constitutional rule(s) that triggered the denial. Silent denials
      without explanations are prohibited.
    keywords:
      - "denied without reason"
      - "no appeal"
      - "final decision"
    patterns:
      - "denied.{0,60}(without|no).{0,20}(appeal|reason|explanation|rule)"

  - id: HC-015
    severity: medium
    category: generic_substitution
    text: >
      Generic substitution must be therapeutically equivalent.
      NTI drugs (Warfarin, Digoxin, Lithium, Phenytoin, Levothyroxine)
      must not be substituted without clinical review and INR/drug level
      recheck within 5-7 days.
    keywords:
      - "generic substitution"
      - "therapeutic equivalent"
      - "bioequivalent"
    patterns:
      - "substitute.{0,40}(warfarin|digoxin|lithium|phenytoin|levothyroxine)"
      - "generic.{0,30}(warfarin|digoxin|lithium|phenytoin|levothyroxine).{0,40}(without|no).{0,20}(monitor|recheck)"

# LOW: Quality standards
  - id: HC-016
    severity: low
    category: confidence
    text: >
      Governance decisions with confidence below 0.7 should be flagged for
      secondary review by a senior clinician or pharmacist.
    keywords: []
    patterns: []

  - id: HC-017
    severity: low
    category: polypharmacy
    text: >
      Polypharmacy (5 or more concurrent medications) requires comprehensive
      drug interaction screening and medication reconciliation before adding
      new agents.
    keywords:
      - "polypharmacy"
      - "multiple medications"
      - "drug burden"
      - "medication reconciliation"
    patterns: []

  - id: HC-018
    severity: low
    category: allergy
    text: >
      Known drug allergies must be checked before proposing any new medication.
      Cross-reactive allergies (e.g., penicillin / cephalosporins) must be
      documented and assessed.
    keywords:
      - "allergy"
      - "allergic"
      - "hypersensitivity"
      - "anaphylaxis"
      - "penicillin allergy"
    patterns:
      - "(known|documented|reported).{0,30}allerg.{0,50}(without|no).{0,20}(check|verify|screen)"

  - id: HC-019
    severity: low
    category: time_sensitive
    text: >
      Time-sensitive medications (thrombolytics, antibiotics for sepsis,
      insulin for DKA) require urgency documentation and time-to-administration
      tracking.
    keywords:
      - "time-sensitive"
      - "time-critical"
      - "stat"
      - "thrombolytic"
      - "tpa"
      - "alteplase"
      - "tissue plasminogen"
    patterns: []

  - id: HC-020
    severity: low
    category: age_appropriateness
    text: >
      Patient age must be consistent with proposed therapy indication.
      Medications approved only for adults must not be proposed for
      pediatric patients without documented clinical justification.
    keywords:
      - "age-inappropriate"
      - "adult only medication"
      - "not approved for children"
    patterns:
      - "adult.{0,20}(only|medication|drug).{0,50}(child|infant|neonate|pediatric)"
