[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "acgs-auth0"
version = "0.1.0"
description = "Constitutional Token Governance for AI Agents — ACGS × Auth0 Token Vault"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "AGPL-3.0-or-later" }
keywords = ["acgs", "auth0", "token-vault", "ai-agents", "governance", "maci"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries",
]
[project.urls]
Homepage = "https://acgs.ai"
Documentation = "https://github.com/acgs2_admin/acgs/tree/main/packages/acgs_auth0"
Repository = "https://github.com/acgs2_admin/acgs"
Issues = "https://github.com/acgs2_admin/acgs/issues"
Changelog = "https://github.com/acgs2_admin/acgs/releases"
PyPI = "https://pypi.org/project/acgs-auth0/"

dependencies = [
    "httpx>=0.28.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
langchain = [
    "auth0-ai-langchain>=1.0.1",
    "langchain-core>=0.3.0",
]
full = [
    "auth0-ai>=1.0.2",
    "auth0-ai-langchain>=1.0.1",
    "langchain-core>=0.3.0",
    "langgraph>=0.5.0",
    "structlog>=24.0",
]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pytest-cov>=5.0",
]

[tool.hatch.build.targets.wheel]
packages = ["acgs_auth0"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "--import-mode=importlib"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.mypy]
python_version = "3.11"
strict = true
