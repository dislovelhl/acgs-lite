# ACGS-2 Enhanced Agent Bus - Project Configuration
# Constitutional Hash: 608508a9bd224290

[build-system]
requires = ["setuptools>=80.9.0", "wheel>=0.46.0"]  # CVE-2025-69226, CVE-2025-69229 patched
build-backend = "setuptools.build_meta"

[project]
name = "enhanced-agent-bus"
version = "3.0.2"
description = "ACGS-2 Enhanced Agent Bus with Constitutional Compliance"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [
    {name = "ACGS Team"}
]
dependencies = [
    "aiofiles>=24.1.0",
    "fastapi>=0.115.0",
    "redis>=5.0.0",
    "httpx>=0.27.0",
    "pydantic>=2.12.1",  # CVE-2025-6607 patched (ReDoS via pattern validation)
    "litellm>=1.61.6",  # CVE-2025-1499 patched (Path traversal RCE)
    "slowapi>=0.1.9",
    "msgpack>=1.0.0",  # High-performance serialization (15-25% faster than JSON)
    "pybreaker>=1.0.0",
    "prometheus-client>=0.20.0",
    "jsonschema>=4.0.0",
    "PyJWT>=2.8.0",
    "cachetools>=5.0.0",
    "PyYAML>=6.0.0",
    "psutil>=5.9.0",
    "orjson>=3.9.0",
    "python-multipart>=0.0.20",
]

[project.urls]
Homepage = "https://acgs.ai"
Documentation = "https://github.com/dislovelhl/enhanced-agent-bus"
Repository = "https://github.com/dislovelhl/enhanced-agent-bus"
Issues = "https://github.com/dislovelhl/enhanced-agent-bus/issues"
Changelog = "https://github.com/dislovelhl/enhanced-agent-bus/releases"
PyPI = "https://pypi.org/project/enhanced-agent-bus/"

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=4.1.0",
    "pytest-mock>=3.11.0",
    "pytest-benchmark>=4.0.0",
    "fakeredis>=2.18.0",
]
ml = [
    "numpy>=1.24.0",
    "mlflow>=2.10.0",
    "evidently>=0.4.0",
    "river>=0.21.0",
    "scikit-learn>=1.4.0",
    "pandas>=2.1.0",
]
pqc = [
    # Post-Quantum Cryptography (NIST PQC standards)
    "liboqs-python>=0.10.0",  # CRYSTALS-Kyber, CRYSTALS-Dilithium, SPHINCS+
    "cryptography>=44.0.2",  # CVE patched - Classical crypto (Ed25519, X25519) for hybrid mode
]
postgres = [
    # PostgreSQL support for saga persistence
    "asyncpg>=0.29.0",  # High-performance async PostgreSQL driver
    "sqlalchemy>=2.0.0",
]
messaging = [
    "aiokafka>=0.10.0",
]

[tool.setuptools.package-dir]
enhanced_agent_bus = "."

[tool.setuptools.package-data]
enhanced_agent_bus = ["policies/*.rego", "py.typed"]

[tool.pytest.ini_options]
minversion = "7.0"
pythonpath = ["../.."]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
asyncio_mode = "auto"
addopts = [
    "-v",
    "--strict-markers",
    "--tb=short",
    "-ra",
]
markers = [
    "asyncio: mark test as async",
    "unit: marks tests as unit tests",
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests requiring external services",
    "constitutional: marks tests for constitutional validation",
    "benchmark: marks performance benchmark tests",
    "governance: marks tests as critical governance path tests (90%+ coverage required)",
    "e2e: marks end-to-end tests",
    "chaos: marks chaos engineering tests (T003)",
    "pqc_deprecation: marks tests for PQC API deprecation and Phase 4 migration",
]
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
    # Ignore coroutine warnings from mock objects in integration tests
    "ignore:coroutine 'AsyncMockMixin._execute_mock_call' was never awaited:RuntimeWarning",
    "ignore:coroutine 'MockComponent.__getattr__.<locals>.async_mock' was never awaited:RuntimeWarning",
]

[tool.coverage.run]
# Source directory for coverage collection
source = ["."]
branch = true
# Ensure coverage finds modules even when run from different directories
relative_files = true
# Dynamically find source based on current directory
dynamic_context = "test_function"
omit = [
    "tests/*",
    "*/__pycache__/*",
    "*.pyc",
    "venv/*",
    ".venv/*",
    # Test directories in subdirectories
    "*/tests/*",
    "observability/tests/*",
    "specs/tests/*",
    "acl_adapters/tests/*",
    # Internal test/example files (not part of main package)
    "deliberation_layer/simple_test.py",
    "deliberation_layer/test_deliberation.py",
    "test_rust_integration.py",
    "validation_integration_example.py",
    # Setup files
    "setup.py",
    "conftest.py",
    "**/conftest.py",
    # Modules requiring unavailable external dependencies
    "deliberation_layer/dashboard.py",  # Requires streamlit
    "deliberation_layer/impact_scorer.py",  # Requires transformers
    "deliberation_layer/__init__.py",  # Requires transformers
    # Spec fixtures (not production code)
    "specs/*",
    "specs/**/*",
    # Example and standalone test files (not part of test suite)
    "test_diagnostic.py",
    "test_minimal.py",
    "test_rust_governance.py",
    "health_aggregator_example.py",
    # Other non-production code
    "sandbox.py",
    "dx_ecosystem.py",
    "retrieval_triad.py",
    "sql_agent.py",
    "graph_database.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "if typing.TYPE_CHECKING:",
]
fail_under = 80
show_missing = true
precision = 2

[tool.coverage.html]
directory = "htmlcov"

[tool.coverage.xml]
output = "coverage.xml"

[tool.ruff]
line-length = 100
target-version = "py311"
lint.select = ["E", "F", "B", "I"]
lint.ignore = [
    "E501",   # line too long, handled by black
    "E402",   # module level import not at top - intentional for try/except fallback patterns
    "F403",   # star imports - intentional for re-export modules
    "F811",   # duplicate fixture/protocol test definitions in coverage suites
    "B008",   # function call in default argument - FastAPI Depends() pattern
]

[tool.ruff.lint.isort]
known-first-party = ["shared", "services", "enhanced_agent_bus"]

[tool.ruff.lint.per-file-ignores]
# Re-export modules intentionally import for external use
"__init__.py" = ["F401"]
# Main module files with intentional re-exports and fallback imports
"agent_bus.py" = ["F401", "F405"]
"core.py" = ["F401", "F405"]
"registry.py" = ["F401"]
"maci_enforcement.py" = ["F401"]
"opa_client.py" = ["F401"]
"message_processor.py" = ["F401"]
"validators.py" = ["F401"]
"validation_strategies.py" = ["F401"]
"models.py" = ["F401"]
"chaos_testing.py" = ["F401"]
# Deliberation layer modules with complex import fallbacks
"deliberation_layer/*.py" = ["F401", "F405"]
# Observability modules
"observability/*.py" = ["F401"]
# AI assistant integration
"ai_assistant/*.py" = ["F401"]
# Test files may have unused variables for fixture creation
"tests/*" = ["F841", "F401"]
"*/tests/*" = ["F841", "F401"]
"**/test_*.py" = ["F841", "F401"]
"**/*_test.py" = ["F841", "F401"]
# Aggregator modules with intentional re-exports
"ultimate_agentic_system.py" = ["F401"]
"meta_orchestrator.py" = ["F401"]
"verify_*.py" = ["F401", "T20"]
"api.py" = ["F401"]  # Constitutional hash import for compliance
"constitutional/*.py" = ["F401"]  # Re-exports and type imports
"enterprise_sso/*.py" = ["F401"]  # SSO integration imports
"safla_memory.py" = ["F401"]  # Memory module imports
# Example files demonstrate patterns without using all variables
"examples/*" = ["F841"]
# Spec fixtures are test infrastructure
"specs/*" = ["F841"]
"specs/**/*" = ["F841"]

[tool.black]
line-length = 100
target-version = ['py311']

[tool.mypy]
strict = true
ignore_missing_imports = true
exclude = ["venv", ".venv", "tests"]
check_untyped_defs = true
disallow_any_generics = false
# Re-enabled 2026-03: these were defeating strict mode.  New code MUST have
# full type annotations.  Existing violations are grandfathered via per-module
# overrides below — remove overrides as modules are brought into compliance.
disallow_incomplete_defs = true
disallow_untyped_defs = true
no_implicit_optional = true

# Grandfathered modules with pre-existing untyped defs — fix incrementally.
[[tool.mypy.overrides]]
module = [
    "enhanced_agent_bus._ext_*",
    "enhanced_agent_bus.deliberation_layer.*",
    "enhanced_agent_bus.llm_adapters.*",
    "enhanced_agent_bus.enterprise_sso.*",
    "enhanced_agent_bus.cognitive.*",
    "enhanced_agent_bus.ai_assistant.*",
    "enhanced_agent_bus.context.*",
    "enhanced_agent_bus.langgraph_orchestration.*",
]
disallow_untyped_defs = false
disallow_incomplete_defs = false
