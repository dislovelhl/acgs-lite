# Alerting Rules for MACI Governance System
#
# Defines Prometheus alerting rules for constitutional compliance,
# performance thresholds, and MACI violations.
#
# Constitutional Hash: 608508a9bd224290

groups:
  - name: maci_governance_alerts
    interval: 30s
    rules:
      # Critical: Constitutional Violations
      - alert: MACIConstitutionalViolation
        expr: increase(maci_maci_violations_total[1m]) > 0
        for: 0s
        labels:
          severity: critical
          category: governance
        annotations:
          summary: "MACI Constitutional Violation Detected"
          description: "A MACI role violation has been detected. Immediate investigation required."
          runbook_url: "https://docs.acgs.local/runbooks/maci-violation"

      # Critical: High Error Rate
      - alert: MACIHighErrorRate
        expr: |
          sum(rate(maci_requests_total{status="failure"}[5m]))
          / sum(rate(maci_requests_total[5m])) > 0.1
        for: 2m
        labels:
          severity: critical
          category: reliability
        annotations:
          summary: "High MACI Error Rate"
          description: "Error rate is above 10% for more than 2 minutes."

      # Warning: Elevated Response Time
      - alert: MACISlowResponse
        expr: |
          histogram_quantile(0.99,
            sum(rate(maci_response_time_seconds_bucket[5m])) by (le)
          ) > 0.05
        for: 3m
        labels:
          severity: warning
          category: performance
        annotations:
          summary: "MACI Response Time Elevated"
          description: "P99 response time is above 50ms."

      # Warning: Cache Hit Rate Low
      - alert: MACILowCacheHitRate
        expr: |
          sum(rate(maci_cache_hits_total[5m]))
          / (sum(rate(maci_cache_hits_total[5m])) + sum(rate(maci_cache_misses_total[5m]))) < 0.8
        for: 5m
        labels:
          severity: warning
          category: performance
        annotations:
          summary: "Cache Hit Rate Below Threshold"
          description: "Cache hit rate has dropped below 80%."

      # Warning: High Validation Failure Rate
      - alert: MACIHighValidationFailure
        expr: |
          sum(rate(maci_compliance_validations_total{result="failed"}[5m]))
          / sum(rate(maci_compliance_validations_total[5m])) > 0.05
        for: 2m
        labels:
          severity: warning
          category: compliance
        annotations:
          summary: "High Constitutional Validation Failure Rate"
          description: "More than 5% of constitutional validations are failing."

      # Info: Compliance Hash Mismatch
      - alert: MACIHashMismatch
        expr: |
          maci_constitutional_info{hash!="608508a9bd224290"}
        for: 0s
        labels:
          severity: info
          category: compliance
        annotations:
          summary: "Constitutional Hash Mismatch Detected"
          description: "Cached data has different constitutional hash than current."

  - name: maci_performance_alerts
    interval: 30s
    rules:
      # Warning: Throughput Drop
      - alert: MACILowThroughput
        expr: |
          sum(rate(maci_requests_total[5m])) < 50
        for: 5m
        labels:
          severity: warning
          category: performance
        annotations:
          summary: "MACI Request Throughput Low"
          description: "Request rate has dropped below 50 RPS."

      # Warning: High Concurrent Operations
      - alert: MACIHighConcurrentOps
        expr: |
          sum(maci_active_operations) > 1000
        for: 2m
        labels:
          severity: warning
          category: performance
        annotations:
          summary: "High Number of Concurrent Operations"
          description: "More than 1000 concurrent MACI operations detected."

      # Info: Validation Time Increasing
      - alert: MACIValidationTimeIncreasing
        expr: |
          histogram_quantile(0.95,
            sum(rate(maci_validation_time_seconds_bucket[5m])) by (le)
          ) > 0.1
        for: 5m
        labels:
          severity: info
          category: performance
        annotations:
          summary: "Validation Time Increasing"
          description: "P95 validation time is above 100ms."

  - name: durable_workflow_alerts
    interval: 30s
    rules:
      # Critical: High Workflow Failure Rate
      - alert: DurableWorkflowHighFailureRate
        expr: |
          sum(rate(durable_workflow_failed_total[5m]))
          / sum(rate(durable_workflow_started_total[5m])) > 0.1
        for: 2m
        labels:
          severity: critical
          category: reliability
        annotations:
          summary: "High Workflow Failure Rate"
          description: "More than 10% of durable workflows are failing."

      # Warning: Workflows Stuck / Long Duration
      - alert: DurableWorkflowSlowExecution
        expr: |
          histogram_quantile(0.95,
            sum(rate(durable_workflow_duration_seconds_bucket[10m])) by (le, workflow_type)
          ) > 300
        for: 5m
        labels:
          severity: warning
          category: performance
        annotations:
          summary: "Slow Workflow Execution"
          description: "P95 duration for {{ $labels.workflow_type }} is over 5 minutes."

      # Critical: Compensation Failures
      - alert: DurableWorkflowCompensationFailed
        expr: increase(durable_workflow_compensation_failed_total[5m]) > 0
        for: 0s
        labels:
          severity: critical
          category: reliability
        annotations:
          summary: "Workflow Compensation Failed"
          description: "A saga compensation failed to execute. Manual intervention may be required to fix inconsistent state."
