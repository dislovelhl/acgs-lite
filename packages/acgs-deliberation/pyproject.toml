[build-system]
requires = ["setuptools>=80.9.0", "wheel>=0.46.0"]
build-backend = "setuptools.build_meta"

[project]
name = "acgs-deliberation"
version = "0.1.1"
description = "ACGS deliberation and HITL orchestration package"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [{name = "ACGS Team", email = "hello@acgs.dev"}]
dependencies = [
    "enhanced-agent-bus>=3.0.0",
]

[project.urls]
Homepage = "https://acgs.ai"
Documentation = "https://github.com/dislovelhl/acgs-deliberation"
Repository = "https://github.com/dislovelhl/acgs-deliberation"
Issues = "https://github.com/dislovelhl/acgs-deliberation/issues"
Changelog = "https://github.com/dislovelhl/acgs-deliberation/releases"
PyPI = "https://pypi.org/project/acgs-deliberation/"

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
]

[tool.setuptools]
packages = [
    "acgs_deliberation",
]

[tool.setuptools.package-dir]
acgs_deliberation = "src/acgs_deliberation"

[tool.pytest.ini_options]
minversion = "7.0"
addopts = "--import-mode=importlib"
