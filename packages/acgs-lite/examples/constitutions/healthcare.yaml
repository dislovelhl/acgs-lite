    - "HIPAA Security Rule (45 CFR 164.302-318)"
    - "FDA Guidance on Clinical Decision Support Software (2022)"
    - "21st Century Cures Act Section 3060"
    - "FDA MedWatch Adverse Event Reporting"
    - "ONC Health IT Certification (45 CFR 170)"
