# Constitutional Sentinel — Governance Rules for AI-Generated Code
#
# This constitution governs all code proposed by GitLab Duo agents.
# It extends the built-in GitLab template with AI-specific rules.
#
# Usage:
#   from acgs_lite import Constitution
#   constitution = Constitution.from_yaml("hackathon/constitution.yaml")

name: gitlab-duo-governance
version: "1.0.0"
description: |
  Constitutional rules for AI-generated code in GitLab.
  Enforced by the Constitutional Sentinel on every Duo-authored MR.

rules:
  # ── MACI: Separation of Powers ───────────────────────────────
  - id: GL-001
    text: MR author cannot approve their own merge request (MACI separation of powers)
    severity: critical
    category: maci
    keywords:
      - self-approve
      - auto-approve
      - approve own
      - skip review
      - bypass review
      - self-authorize

  # ── Security: Credentials ────────────────────────────────────
  - id: GL-002
    text: No credentials or secrets committed to repository
    severity: critical
    category: security
    keywords:
      - api_key
      - apikey
      - password
      - passwd
      - secret
      - private_key
      - access_token
      - bearer
    patterns:
      - 'sk-[a-zA-Z0-9]{20,}'           # OpenAI keys
      - 'glpat-[a-zA-Z0-9_-]{20,}'      # GitLab tokens
      - 'ghp_[a-zA-Z0-9]{36}'           # GitHub tokens
      - 'AKIA[0-9A-Z]{16}'              # AWS access keys
      - '(?i)(password|passwd|secret)\s*[=:]\s*["\x27][^"\x27]{4,}'  # inline secrets

  # ── Privacy: PII ─────────────────────────────────────────────
  - id: GL-003
    text: No PII (SSN, credit cards) in source code or commit messages
    severity: critical
    category: data-protection
    keywords:
      - social security
      - ssn
      - credit card
      - date of birth
    patterns:
      - '\b\d{3}-\d{2}-\d{4}\b'                              # SSN
      - '\b\d{4}[\s-]?\d{4}[\s-]?\d{4}[\s-]?\d{4}\b'       # Credit card

  # ── Operations: Destructive SQL ──────────────────────────────
  - id: GL-004
    text: Destructive production operations require human review
    severity: high
    category: operations
    keywords:
      - drop table
      - drop database
      - truncate table
      - delete from
    patterns:
      - '(?i)DROP\s+(TABLE|DATABASE|SCHEMA|INDEX)'
      - '(?i)TRUNCATE\s+(TABLE\s+)?\w+'
      - '(?i)DELETE\s+FROM\s+\w+\s*;'   # DELETE without WHERE

  # ── CI/CD: Pipeline Integrity ────────────────────────────────
  - id: GL-005
    text: CI/CD pipelines must not skip constitutional validation
    severity: high
    category: ci-cd
    keywords:
      - skip governance
      - disable governance
      - allow_failure
      - skip_validation
      - no-verify

  # ── Audit: Traceability ──────────────────────────────────────
  - id: GL-006
    text: Agent actions must produce an audit trail entry
    severity: medium
    category: compliance
    keywords:
      - no-audit
      - skip audit
      - disable logging
      - delete logs
      - suppress logs

  # ── Safety: Self-modification ────────────────────────────────
  - id: SEC-001
    text: AI agents must not modify their own validation or safety logic
    severity: critical
    category: safety
    keywords:
      - self-validate
      - bypass validation
      - bypass_validation
      - skip check
      - skip_check
      - override safety
      - override_safety
      - disable guardrails
      - disable_guardrails
      - circumvent
      - evade check
      - skip oversight
      - skip_oversight

  # ── Safety: Privilege Escalation ─────────────────────────────
  - id: SEC-002
    text: AI agents must not escalate privileges or access unauthorized systems
    severity: critical
    category: safety
    keywords:
      - escalate privilege
      - unauthorized access
      - admin override
      - sudo rm
      - chmod 777
      - root access

  # ── EU AI Act: Risk Classification ───────────────────────────
  - id: EU-AI-001
    text: High-risk AI actions must include risk classification metadata
    severity: high
    category: regulatory
    keywords:
      - unclassified risk
      - skip classification
      - no risk assessment

  # ── Green: Resource Efficiency ───────────────────────────────
  - id: GREEN-001
    text: AI agents must not make unbounded or wasteful LLM API calls
    severity: medium
    category: sustainability
    keywords:
      - unlimited requests
      - infinite loop
      - no max_iterations
      - bypass rate limit
      - ignore quota
      - max_tokens = -1

metadata:
  author: ACGS Constitutional Sentinel
  license: AGPL-3.0-or-later
  hackathon: GitLab AI Hackathon 2026
  constitutional_hash_note: |
    The constitutional hash is computed from all rule IDs + severities + texts.
    It changes when any rule is added, modified, or removed.
    All validation results embed this hash for tamper-evident audit trails.
