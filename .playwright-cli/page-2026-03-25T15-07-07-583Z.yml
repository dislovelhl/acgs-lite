        - textbox "* About the project" [ref=e128]:
          - /placeholder: "## Inspiration...\n"
          - text: "Inspiration AI coding assistants can generate useful code quickly, but they do not understand an organization’s security rules, compliance requirements, or separation-of-duties policies. That creates a dangerous gap: an AI-generated merge request can hardcode credentials, expose PII, weaken CI controls, or introduce destructive production operations before anyone notices. In many teams, the same person who prompted the AI is also the first person reviewing the code. We built Constitutional Sentinel to add an independent governance layer to that workflow. What it does Constitutional Sentinel is a GitLab merge request governance agent powered by ACGS-Lite. When a merge request is opened or updated, it: - inspects the merge request diff automatically - validates added lines against constitutional governance rules for secrets, PII, destructive SQL, CI bypasses, and separation-of-powers violations - posts inline comments directly on violating lines so developers can see exactly what needs to change - generates a governance summary with risk score, violations found, and the constitutional hash of the active ruleset - blocks unsafe merges when HIGH or CRITICAL violations are present - preserves a tamper-evident audit trail so reviewers can prove which rules were applied to a specific decision This is not a chat assistant and not just a linter summary. It is an agent that reacts to GitLab events and takes governance action inside the merge request workflow. How we built it ### Governance engine Constitutional Sentinel runs on ACGS-Lite, a Python governance engine with an optional Rust/PyO3 fast path for performance-sensitive validation. ### Constitution format Rules live in a portable YAML constitution. Each rule includes: - rule ID - severity - category - keywords - optional regex patterns That makes the system adaptable to internal engineering policies as well as regulated environments. ### GitLab workflow integration We built the GitLab-facing layer to work with real merge request workflows: - webhook handler for merge request events - diff extraction and per-line validation - inline MR comments for precise findings - governance summary report posted back to GitLab - CI/CD stage that can fail the pipeline when violations are severe enough ### Deployment The demo is packaged as a stateless container and deployed on Google Cloud Run, so it can scale to zero and still respond quickly to merge request events. ### MACI separation of powers We use a strict three-role model for governance: - Proposer — the AI assistant that writes or suggests code - Validator — Constitutional Sentinel, which reviews independently - Executor — the human who decides whether to merge That means the system that proposes code is never the system that validates it. Challenges we ran into - balancing precision and speed: we needed the system to scan diffs quickly without missing critical issues like credentials or PII - mapping findings back to the exact diff locations for inline GitLab comments - creating a stable constitutional hash so governance decisions could be audited later - making governance feel native to the MR workflow instead of like an external report nobody reads Accomplishments we’re proud of - a working end-to-end GitLab MR governance flow that reacts to events and comments directly on code - 12 violations caught in a single demo merge request - merge-blocking behavior for unsafe changes - tamper-evident constitutional hashing and audit trail support - 30/30 hackathon evals passing for the hackathon-focused integration surface - a clear, inspectable demo judges can review directly in GitLab What we learned - governance for AI-generated code needs to be structural, not advisory - inline feedback beats detached reports for developer adoption - separation of powers matters in agent workflows, not just human institutions - performance matters, but clarity in workflow impact matters even more What’s next - register the Sentinel as a more native GitLab Duo / flow-style governance step - expand constitutional templates for more compliance and engineering-policy use cases - add multi-project governance for GitLab groups - expose governance capabilities through MCP and other agent integrations Try it out - GitLab Project: https://gitlab.com/martin664/constitutional-sentinel-demo - Live Demo MR: https://gitlab.com/martin664/constitutional-sentinel-demo/-/merge_requests/1 - Constitution: see hackathon/constitution.yaml - Video: add your public YouTube/Vimeo link here before submitting"
