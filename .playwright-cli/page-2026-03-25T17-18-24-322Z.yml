          - generic [ref=e75]:
            - heading "Inspiration" [level=2] [ref=e76]
            - paragraph [ref=e77]: AI coding assistants can generate merge requests quickly, but they do not understand an organization's security rules, compliance boundaries, or separation-of-duties policies. That creates a governance gap inside GitLab workflows.
            - heading "What it does" [level=2] [ref=e78]
            - paragraph [ref=e79]: Constitutional Sentinel is a GitLab merge request governance agent powered by ACGS-Lite. It validates AI-assisted code and workflow actions against constitutional rules before they take effect. It inspects diffs, flags violating lines inline, generates a governance summary with risk score and constitutional hash, blocks unsafe merges, and preserves tamper-evident audit records.
            - heading "Key features" [level=2] [ref=e80]
            - list [ref=e81]:
              - listitem [ref=e82]: "MACI separation of powers: Proposer, Validator, Executor"
              - listitem [ref=e83]: Optional Rust/PyO3 fast path for performance-sensitive validation
              - listitem [ref=e84]: 9 regulatory frameworks covered with 125 checklist items, 72 auto-populated
              - listitem [ref=e85]: 5-tier escalation and context-aware risk scoring
              - listitem [ref=e86]: 11 integration surfaces across GitLab, CI/CD, MCP, and deployment paths
              - listitem [ref=e87]:
                - text: "Tamper-evident constitutional hash:"
                - code [ref=e88]: 608508a9bd224290
            - heading "How we built it" [level=2] [ref=e89]
            - paragraph [ref=e90]: We built the project on ACGS-Lite, a Python governance engine with an optional Rust/PyO3 validation path. Rules are defined in portable YAML constitutions with IDs, severities, categories, keywords, and optional regex patterns. The GitLab-facing layer handles merge request events, diff extraction, per-line validation, inline comments, governance summaries, and merge or pipeline gating. The demo is packaged as a stateless container for Google Cloud Run with optional Cloud Logging export.
            - heading "Challenges" [level=2] [ref=e91]
            - paragraph [ref=e92]: The hardest parts were balancing precision with speed, mapping findings back to exact diff lines for inline comments, and keeping constitutional hashing reproducible so governance decisions can be audited later.
            - heading "What we learned" [level=2] [ref=e93]
            - paragraph [ref=e94]: Governance for AI-generated code works best when it is structural, not advisory. Inline MR feedback is more useful than detached reports, and separation of powers matters for agent workflows just as much as it does for human institutions.
            - heading "Validation" [level=2] [ref=e95]
            - list [ref=e96]:
              - listitem [ref=e97]:
                - code [ref=e98]: python -m pytest packages/acgs-lite/tests/test_hackathon_evals.py -v --import-mode=importlib
              - listitem [ref=e99]:
                - code [ref=e100]: 30/30
                - text: hackathon evals passed
            - heading "Why it matters" [level=2] [ref=e101]
            - paragraph [ref=e102]: AI systems are increasingly writing code, making decisions, and triggering workflows without understanding compliance boundaries. Constitutional Sentinel adds the missing governance layer so risky behavior can be constrained, audited, and reviewed before it reaches production.
