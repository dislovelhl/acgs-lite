        - generic [ref=e136]:
          - generic [ref=e137] [cursor=pointer]: "* What date (MM-DD-YY) did you start your project?"
          - paragraph [ref=e138]: Please note that the project must have been significantly updated after February 9th.
          - textbox "* What date (MM-DD-YY) did you start your project?" [ref=e139]: 03-14-26
        - generic [ref=e140]:
          - generic [ref=e141] [cursor=pointer]: If Existing, explain what you updated after February 9th for the hackathon.
          - paragraph [ref=e142]: We recommend explaining this in your text description, too!
          - textbox "If Existing, explain what you updated after February 9th for the hackathon." [ref=e143]: "After February 9th, we built the hackathon-specific GitLab governance workflow on top of the existing ACGS foundation. For the hackathon, we added the Constitutional Sentinel demo: GitLab merge request integration, diff extraction, inline MR violation comments, governance summary reporting, merge-blocking behaviour for unsafe changes, a hackathon-specific constitutional ruleset, Cloud Run deployment flow, and demo/eval assets tailored to the GitLab AI Hackathon. We also productized supporting CLI workflows for governance testing, lifecycle management, refusal explanation, and telemetry export so that the demo could show not just policy enforcement, but an operational governance workflow around AI-generated code."
        - generic [ref=e144]:
          - generic [ref=e145] [cursor=pointer]: "* Testing Instructions for application"
          - paragraph
          - textbox "* Testing Instructions for application" [ref=e146]: Open the public demo MR at https://gitlab.com/martin664/constitutional-sentinel-demo/-/merge_requests/1, review the inline governance comments in the Changes tab, and review the governance summary in the merge request discussion. For local verification, run python -m pytest packages/acgs-lite/tests/test_hackathon_evals.py -v --import-mode=importlib from the repo root to validate the hackathon integration surface. If you want to inspect the deployment packaging, review hackathon/cloud-run-deploy.sh and the Cloud Run server in acgs_lite.integrations.cloud_run_server.
        - generic [ref=e147]:
          - generic [ref=e148] [cursor=pointer]: "* Which Category Prizes are you opting into?"
          - paragraph [ref=e149]: Appears in project gallery
          - combobox "* Which Category Prizes are you opting into?" [ref=e150]:
            - option "Make a selection"
            - option "GitLab & Google" [selected]
            - option "GitLab & Anthropic"
            - option "Green Agent Prize"
            - option "Sustainable Design"
        - generic [ref=e151]:
          - generic [ref=e152] [cursor=pointer]: If you selected a Category Prize above, please explain how your project is eligible for it.
          - paragraph
          - textbox "If you selected a Category Prize above, please explain how your project is eligible for it." [ref=e153]: Constitutional Sentinel is deeply integrated with GitLab merge request workflows and is deployed as a stateless service on Google Cloud Run. The demo uses GitLab webhooks, GitLab merge request feedback loops, and Google Cloud Run deployment to deliver a GitLab-native governance workflow for AI-generated code.
        - generic [ref=e154]:
          - generic [ref=e155] [cursor=pointer]: "* URL to your open source Agent that is published in the GitLab AI Hackathon group here: https://gitlab.com/gitlab-ai-hackathon"
          - paragraph [ref=e156]: If a repository is included, it must be public and have a complete open source license that is detectable and visible at the top of the repository page (in the Project information section). See the full rules for details
          - 'textbox "* URL to your open source Agent that is published in the GitLab AI Hackathon group here: https://gitlab.com/gitlab-ai-hackathon" [ref=e157]':
            - /placeholder: https://
            - text: https://gitlab.com/martin668/constitutional-sentinel-demo
        - generic [ref=e158]:
          - generic [ref=e159] [cursor=pointer]: "* What is the biggest takeaway from your participation in the GitLab AI Hackathon?"
          - paragraph
          - textbox "* What is the biggest takeaway from your participation in the GitLab AI Hackathon?" [ref=e160]: The biggest takeaway was that AI governance works best when it is structural and embedded in the developer workflow. Inline MR feedback, separation of powers, and auditability create far more trust than advisory prompts or detached reports.
        - generic [ref=e161]:
          - generic [ref=e162] [cursor=pointer]: "* Explain at least one thing we could have done differently to improve your experience in the GitLab AI Hackathon?"
          - paragraph
          - textbox "* Explain at least one thing we could have done differently to improve your experience in the GitLab AI Hackathon?" [ref=e163]: A clearer early checklist for the GitLab group repository requirement, category-prize eligibility, and final submission expectations would have made the handoff from project building to submission smoother. A couple of concrete example submissions would also help participants optimize their entries faster.
        - generic [ref=e164]:
          - generic [ref=e165] [cursor=pointer]: "* Which AI tools have you leveraged while working on this project?"
          - paragraph
          - textbox "* Which AI tools have you leveraged while working on this project?" [active] [ref=e166]: Claude, GitLab Duo, Anthropic Claude for the bonus-track integration path, and agentic coding workflows around ACGS-Lite governance components.
