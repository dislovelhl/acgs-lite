site_name: ACGS -- Constitutional AI Governance
site_description: Constitutional governance infrastructure for AI agents
site_url: https://acgs.ai/docs
repo_url: https://github.com/dislovelhl/acgs-lite
repo_name: dislovelhl/acgs-lite
edit_uri: edit/main/docs/

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            show_signature_annotations: true
            docstring_style: google
  - mike:
      version_selector: true
      css_dir: css
      javascript_dir: js
  - git-revision-date-localized:
      enable_creation_date: true
      type: date

extra:
  version:
    provider: mike
    default: stable
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/dislovelhl/acgs-lite
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/acgs-lite/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - 2026 Safety Standards:
      - Why Governance?: why-governance.md
      - OWASP Top 10 for Agents: owasp-2026.md
      - Regulatory Compliance: compliance-2026.md
      - Industry Use Cases: use-cases.md
  - Advanced Safety:
      - MCP Governance Guide: mcp-guide.md
      - Supervisor Models: supervisor-models.md
      - Testing Governance: testing-governance.md
  - Quickstart: quickstart.md
  - Architecture: architecture.md
  - Integrations: integrations.md
  - Compliance: compliance.md
  - MACI Architecture: maci.md
  - CLI Reference: cli.md
  - Contributing:
      - Overview: contributing.md
      - Adding an Integration: contributing-integrations.md
      - Adding a Compliance Framework: contributing-frameworks.md
  - API Reference:
      - Constitution Lifecycle: api/lifecycle.md
      - Constitution: api/constitution.md
      - Governance Engine: api/engine.md
      - GovernedAgent: api/governed_agent.md
      - MACI: api/maci.md
      - Audit Trail: api/audit.md
      - Compliance: api/compliance.md
  - Changelog: changelog.md
  - Security: security.md
  - Additional Resources:
      - MCP Notes: mcp.md
      - External Distribution Submissions: external-distribution-submissions.md
      - Launch Copy Drafts: launch-copy-drafts.md
      - Final Launch Copy: final-launch-copy.md
      - Hero Demo Capture Plan: hero-demo-capture-plan.md
      - Next Milestones: next-milestones.md
      - OSS Growth Playbook: oss-growth-playbook.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.snippets:
      base_path: [".", "../.."]
      check_paths: false
