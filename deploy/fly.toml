app = "clinicalguard"
primary_region = "ord"

[build]
  dockerfile = "packages/clinicalguard/Dockerfile"

[env]
  CLINICALGUARD_URL = "https://clinicalguard.fly.dev"
  CLINICALGUARD_AUDIT_LOG = "/data/clinicalguard_audit.json"
  CLINICALGUARD_MODEL = "claude-haiku-4-5"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "clinicalguard_data"
  destination = "/data"
  initial_size = "1gb"
